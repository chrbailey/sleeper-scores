  else if (topic.tag.includes("Safety"))
    parts.push(`Public safety directly affects property values and quality of life across ${b.region}. As a financial executive, you understand the downstream effects: perceived safety drives investment, which drives commercial activity, which funds the tax base.`);
  else if (topic.tag.includes("Energy") || topic.tag.includes("Climate"))
    parts.push(`Your career at ${b.company} was built in the clean energy finance space — you know this industry inside and out. These policy decisions affect both your professional legacy and your wallet at the pump.`);
  else if (topic.tag.includes("Business") || topic.tag.includes("Tech"))
    parts.push(`With your career trajectory from CoreLogic to SpringboardAuto to ${b.company}, you've watched ${b.region}'s fintech ecosystem evolve firsthand. Business climate decisions here affect the next generation of companies like the ones you've built.`);
  else if (topic.tag.includes("Health"))
    parts.push(`This is personal for your family. With a 19-year-old son with autism at home, you know the service landscape — the wait times, the provider shortages, the transition cliff — more intimately than most. Every policy change in this space has a face for you.`);
  else if (topic.tag.includes("Parks") || text.includes("pickleball"))
    parts.push(`As ${b.city}'s most dedicated ${b.hobby} player, this one's got your name on it. Court availability, facility investment, and recreation policy directly affect your quality of life — and probably your forehand.`);
  else if (topic.tag.includes("Military"))
    parts.push(`Camp Pendleton's $10.9B annual economic impact touches every business and property value in ${b.region}. Military investment is the economic backbone of your community.`);
  else if (topic.tag.includes("State Policy"))
    parts.push(`Sacramento's decisions land hardest in communities like ${b.city} — where homeowners, small businesses, and families bear the cost of mandates crafted 500 miles away. Your ${b.school} ${b.degree} training taught you to follow the incentives, and the incentives here point directly at your property tax bill.`);
  else if (topic.tag.includes("Transportation"))
    parts.push(`Every commute on El Camino Real, every drive to the ${b.hobby} courts — ${b.region} transportation policy shapes your daily life. As someone who runs the numbers for a living, the cost-per-rider and cost-per-mile figures in transit projects deserve the same scrutiny you'd give a loan portfolio.`);
  else
    parts.push(`From your vantage point as a ${b.city} homeowner, ${b.school} grad, and ${b.industry} executive, this story connects to the fiscal and community dynamics you navigate daily.`);

  // Extra interest hooks — scan for matches from the extraInterests field
  const extras = (b.extraInterests || "").split(",").map(s => s.trim().toLowerCase()).filter(Boolean);

  return parts.join(" ");

function generateConservativeAnalysis(title, snippet, topic) {
  const text = (title + " " + (snippet || "")).toLowerCase();

  if (topic.tag.includes("Tax") || topic.tag.includes("Budget")) {

  } else if (topic.tag.includes("Housing") || topic.tag.includes("Real Estate")) {
    parts.push("Housing affordability in California is primarily a supply problem created by government — CEQA delays, exclusionary zoning, density restrictions, and permitting costs. The conservative position: reduce the regulatory barriers that make construction expensive, allow the market to build to demand, and stop imposing price controls that academic research consistently shows reduce supply.");
    parts.push("\n\nEvery rent control expansion, density mandate from Sacramento, and fee increase on developers makes the next unit of housing more expensive to build — which means fewer units get built — which means prices stay high. The data from Stanford, Harvard, and the Brookings Institution all point the same direction: let the market build.");
  } else if (topic.tag.includes("Education")) {
    parts.push("The conservative education position is straightforward: schools exist primarily to teach children to read, write, and do math. Every dollar and instructional minute directed away from core academics must justify itself against measurable outcomes.");
    parts.push("\n\nNorth County school districts — long among California's best — have seen math and reading proficiency decline while spending on non-academic programs has grown. Taxpayers deserve to know: are we getting better results for more money? If not, why are we spending more?");
  } else if (topic.tag.includes("Safety")) {
    parts.push("Public safety is THE core function of local government — arguably the one function that justifies taxation in the first place. When cities are understaffed on police or failing to enforce existing laws, they're failing at their most basic job.");
    parts.push("\n\nThe post-Grants Pass legal framework gives cities the tools to enforce anti-camping ordinances while referring individuals to available services. The data from cities that combine enforcement with mandatory service referral shows measurable results. The 'compassion without accountability' model has produced a decade of worsening outcomes despite billions in spending.");
  } else if (topic.tag.includes("Energy") || topic.tag.includes("Climate")) {
    parts.push("California's energy policy has created the highest electricity rates and gas prices in the continental United States. The state-imposed cost stack on gasoline alone exceeds $1.60/gallon — that's not market pricing, it's policy pricing.");
    parts.push("\n\nThe conservative position isn't anti-environment — it's pro-accountability. If we're going to impose costs on consumers in the name of climate policy, those programs should demonstrate measurable, cost-effective emissions reductions. The Legislative Analyst's Office has repeatedly noted that California's cap-and-trade expenditures lack rigorous cost-effectiveness metrics.");
  } else if (topic.tag.includes("State Policy")) {
    parts.push("California's governance model increasingly centralizes decision-making in Sacramento while imposing unfunded mandates on local communities. The conservative position: local control produces better outcomes because local officials are more accountable to the people who live with the consequences.");
    parts.push("\n\nWhether it's housing mandates, environmental regulations, or education policy, the pattern is the same: Sacramento legislates, local communities pay. RHNA quotas, CEQA requirements, and expanding regulatory frameworks all flow downhill to cities like Carlsbad — which have limited ability to push back.");
  } else if (topic.tag.includes("Military")) {
    parts.push("Military infrastructure investment represents government spending at its most constitutionally justified. Clear purpose, defined deliverables, competitive contracting, and built-in oversight — this is the standard all government spending should meet.");
    parts.push("\n\nThe economic multiplier of military base investment ($2.80 local return per dollar per SDMAC) consistently outperforms civilian government spending programs. North County residents should actively support federal investment in Camp Pendleton as both a national security priority and an economic engine.");
  } else if (topic.tag.includes("Health")) {
    parts.push("Disability services for individuals who genuinely cannot provide for themselves represent a legitimate category of government spending — the conservative principle of limited government has always included this carve-out. The question is accountability: are funds being deployed effectively, with measurable outcomes?");
    parts.push("\n\nThe economic case for transition services and supported employment is compelling: early investment reduces lifetime public benefit costs by 40-60% (per published research). This isn't compassionate spending — it's smart spending. But it requires rigorous outcome tracking that California's service systems have historically lacked.");
  } else if (topic.tag.includes("Transportation")) {
    parts.push("Transit investment should be evaluated on cost-per-rider, not on ribbon-cutting photo opportunities. When a light rail extension costs $278M per mile while Bus Rapid Transit achieves 90% of the same benefits at 10% of the cost, the choice should be obvious.");
    parts.push("\n\nThe conservative transportation position: invest in infrastructure that serves demonstrated demand at the lowest cost per user. Market signals — actual ridership, actual traffic patterns — should drive investment, not aspirational projections from planning agencies.");
  } else if (topic.tag.includes("Parks") || text.includes("pickleball")) {
    parts.push("Parks and recreation are a legitimate municipal function, and pickleball courts represent some of the highest-utilization, lowest-cost public amenities available. At $25-45K per court serving 200+ daily players, the ROI is exceptional.");
    parts.push("\n\nThis is government spending that makes fiscal sense: responding to demonstrated demand with cost-effective infrastructure. Compare the cost-per-user of a pickleball court to virtually any other public amenity and the math speaks for itself.");
  } else {
    parts.push("The conservative lens on any local policy: Is this a core government function? Is it funded sustainably? Are there measurable outcomes? Is there accountability? These four questions cut through rhetoric on both sides and focus on what actually works for taxpayers and communities.");
    parts.push("\n\nNorth County residents deserve elected officials who apply the same rigor to public spending that a well-run business applies to its budget. Every dollar of taxpayer money should earn its place.");
  }

  return parts.join("");
}

// ── RSS FEED FETCHING via rss2json.com (free, CORS-friendly, no proxy needed) ──
const RSS_FEEDS = DEFAULT_FEED_QUERIES.map(buildFeedUrl);

function extractSource(title) {
  // Google News titles end with " - Source Name"
  const match = title.match(/\s+-\s+(.+)$/);
  return match ? match[1].trim() : "Google News";
}

function cleanTitle(title) {
  return title.replace(/\s+-\s+[^-]+$/, "").trim();
}

function extractDesc(html) {
  if (!html) return "";
  const div = document.createElement("div");
  div.innerHTML = html;
  // Google News descriptions are just anchor tags; grab text content
  const text = div.textContent.trim();
  // Remove duplicate source suffix
  return cleanTitle(text).slice(0, 300);
}

async function fetchFeed(rssUrl) {
  const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
  try {
    const res = await fetch(apiUrl, { signal: AbortSignal.timeout(10000) });
    if (!res.ok) return [];
    const data = await res.json();
    if (data.status !== "ok" || !data.items) return [];
    return data.items.map(item => ({
      title: cleanTitle(item.title || ""),
      link: item.link || "",
      desc: extractDesc(item.description || item.content || ""),
      pubDate: new Date(item.pubDate || Date.now()),
      source: extractSource(item.title || ""),
    }));
  } catch(e) {
    console.warn("Feed fetch failed:", rssUrl, e);
    return [];
  }
}

async function fetchAllFeeds() {
  const results = await Promise.allSettled(RSS_FEEDS.map(url => fetchFeed(url)));
  const all = results.flatMap(r => r.status === "fulfilled" ? r.value : []);
  // Deduplicate by title similarity
  const seen = new Set();
  const unique = all.filter(item => {
    if (!item.title) return false;
    const key = item.title.toLowerCase().replace(/[^a-z0-9]/g, "").slice(0, 40);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
  // Sort by date, newest first
  unique.sort((a, b) => b.pubDate - a.pubDate);
  return unique.slice(0, 30);
}

function rssToStory(item, id) {
  const topic = classifyStory(item.title, item.desc);
  const hoursAgo = Math.max(0.5, (Date.now() - item.pubDate.getTime()) / 3600000);
  return {
    id,
    title: item.title.replace(/ - [^-]+$/, "").trim(), // strip trailing source
    domain: item.source,
    url: item.link,
    tag: topic.tag,
    icon: topic.icon,
    points: Math.floor(Math.random() * 400 + 100),
    user: item.source.replace(/\.(com|org|net|gov|io|edu)$/i, "").replace(/[^a-zA-Z]/g, ""),
    time: hoursAgo,
    commentCount: Math.floor(Math.random() * 300 + 50),
    summary: item.desc || "Read the full article for details.",
    relevance: generateRelevance(item.title, item.desc, topic),
    conservative: generateConservativeAnalysis(item.title, item.desc, topic),
    sources: [
      { text: "Original reporting", src: item.source },
      { text: "Published " + item.pubDate.toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" }), src: item.source }
    ],
    isLive: true
  };
}

  if (h < 1) return `${Math.floor(h * 60)}m ago`;
  if (h < 24) return `${Math.floor(h)}h ago`;
  const d = Math.floor(h / 24);

};

const SLEEPER_BASE = "https://api.sleeper.app/v1";
const NFL_SEASON = "2025";
const POSITION_ORDER = { QB: 1, RB: 2, WR: 3, TE: 4, K: 5, DEF: 6, DL: 7, LB: 8, DB: 9 };
const POS_COLORS = { QB: "#ef4444", RB: "#3b82f6", WR: "#f59e0b", TE: "#8b5cf6", K: "#6b7280", DEF: "#059669", FLEX: "#ec4899" };
const GRADE_COLORS = { elite: "#16a34a", good: "#22c55e", avg: "#f59e0b", below: "#f97316", poor: "#dc2626" };
function gradeColor(g) { return g >= 85 ? GRADE_COLORS.elite : g >= 70 ? GRADE_COLORS.good : g >= 55 ? GRADE_COLORS.avg : g >= 40 ? GRADE_COLORS.below : GRADE_COLORS.poor; }
function gradeLabel(g) { return g >= 85 ? "ELITE" : g >= 70 ? "ABOVE AVG" : g >= 55 ? "AVERAGE" : g >= 40 ? "BELOW AVG" : "POOR"; }

// ── Sleeper API helpers ──
async function sleeperGet(path) {
  const res = await fetch(`${SLEEPER_BASE}${path}`, { signal: AbortSignal.timeout(12000) });
  if (!res.ok) throw new Error(`Sleeper API ${res.status}`);
  return res.json();
}

// Player cache (full NFL player list ~9MB, cache 1hr)
let _playerCache = null;
let _playerCacheTime = 0;
async function getAllPlayers() {
  if (_playerCache && Date.now() - _playerCacheTime < 3600000) return _playerCache;
  try {
    _playerCache = await sleeperGet("/players/nfl");
    _playerCacheTime = Date.now();
    return _playerCache;
  } catch(e) { return _playerCache || {}; }
}

// Multi-week stats cache
let _weeklyStatsCache = {};
async function getWeeklyStats(week) {
  const key = `${NFL_SEASON}_${week}`;
  if (_weeklyStatsCache[key]) return _weeklyStatsCache[key];
  try {
    const data = await sleeperGet(`/stats/nfl/regular/${NFL_SEASON}/${week}`);
    _weeklyStatsCache[key] = data || {};
    return _weeklyStatsCache[key];
  } catch(e) { return {}; }
}
async function getWeeklyProjections(week) {
  try { return await sleeperGet(`/projections/nfl/regular/${NFL_SEASON}/${week}`); }
  catch(e) { return {}; }
}

// Scoring helpers
function calcFantasyPts(stats, scoring = "ppr") {
  if (!stats) return 0;
  let pts = 0;
  pts += (stats.pass_yd || 0) * 0.04;
  pts += (stats.pass_td || 0) * 4;
  pts -= (stats.pass_int || 0) * 2;
  pts += (stats.rush_yd || 0) * 0.1;
  pts += (stats.rush_td || 0) * 6;
  pts += (stats.rec_yd || 0) * 0.1;
  pts += (stats.rec_td || 0) * 6;
  if (scoring === "ppr") pts += (stats.rec || 0) * 1;
  else if (scoring === "half_ppr") pts += (stats.rec || 0) * 0.5;
  pts -= (stats.fum_lost || 0) * 2;
  pts += (stats.fga || 0) > 0 ? (stats.fgm || 0) * 3 : 0;
  pts += (stats.xpm || 0) * 1;
  return Math.round(pts * 10) / 10;
}

// ══════════════════════════════════════════════════════════════════
// ── PFF-STYLE COMPOSITE GRADING ENGINE (built from Sleeper stats)
// ── Grades 0-99 per position, weighted multi-component scoring
// ══════════════════════════════════════════════════════════════════

// Position-specific percentile benchmarks (per-game basis, PPR)
const BENCHMARKS = {
  QB: { pass_yd: [150, 200, 250, 300, 350], pass_td: [0, 1, 2, 3, 4], pass_int: [2, 1.5, 1, 0.5, 0], rush_yd: [0, 10, 25, 40, 60], cmp_pct: [55, 60, 65, 68, 72] },
  RB: { rush_yd: [30, 50, 70, 90, 120], rush_td: [0, 0.3, 0.6, 1, 1.5], rec: [0, 2, 3, 4, 6], rec_yd: [0, 15, 25, 40, 60], fum_lost: [1, 0.5, 0.2, 0.1, 0] },
  WR: { rec: [2, 3, 5, 7, 9], rec_yd: [30, 50, 70, 90, 120], rec_td: [0, 0.3, 0.5, 0.8, 1.2], rec_tgt: [3, 5, 7, 9, 12] },
  TE: { rec: [1, 2, 3, 5, 7], rec_yd: [15, 30, 50, 70, 90], rec_td: [0, 0.2, 0.4, 0.7, 1], rec_tgt: [2, 3, 5, 7, 9] },
};

function percentileScore(val, benchmarks) {
  if (!benchmarks || benchmarks.length < 5) return 50;
  if (val <= benchmarks[0]) return 20;
  if (val >= benchmarks[4]) return 95;
  for (let i = 0; i < 4; i++) {
    if (val <= benchmarks[i + 1]) {
      const range = benchmarks[i + 1] - benchmarks[i];
      const pct = range > 0 ? (val - benchmarks[i]) / range : 0;
      return 20 + (i * 19) + pct * 19;
    }
  }
  return 50;
}

function computeCompositeGrade(stats, pos) {
  if (!stats || !pos) return { overall: 50, components: {}, label: "N/A" };
  const b = BENCHMARKS[pos];
  if (!b) return { overall: 50, components: {}, label: "N/A" };
  const components = {};
  let totalWeight = 0, weightedSum = 0;

  if (pos === "QB") {
    components.passing = percentileScore(stats.pass_yd || 0, b.pass_yd);
    components.touchdowns = percentileScore(stats.pass_td || 0, b.pass_td);
    components.ballSecurity = percentileScore(stats.pass_int || 0, b.pass_int); // inverted
    components.mobility = percentileScore(stats.rush_yd || 0, b.rush_yd);
    const cmpPct = (stats.pass_att || 0) > 0 ? ((stats.pass_cmp || 0) / stats.pass_att) * 100 : 60;
    components.accuracy = percentileScore(cmpPct, b.cmp_pct);
    const w = { passing: 0.28, touchdowns: 0.25, ballSecurity: 0.18, mobility: 0.12, accuracy: 0.17 };
    Object.entries(w).forEach(([k, v]) => { weightedSum += (components[k] || 50) * v; totalWeight += v; });
  } else if (pos === "RB") {
    components.rushing = percentileScore(stats.rush_yd || 0, b.rush_yd);
    components.touchdowns = percentileScore(stats.rush_td || 0, b.rush_td);
    components.receiving = percentileScore(stats.rec || 0, b.rec);
    components.recYards = percentileScore(stats.rec_yd || 0, b.rec_yd);
    components.ballSecurity = percentileScore(stats.fum_lost || 0, b.fum_lost);
    const ypc = (stats.rush_att || 0) > 0 ? (stats.rush_yd || 0) / stats.rush_att : 0;
    components.efficiency = Math.min(99, Math.max(20, ypc * 15));
    const w = { rushing: 0.28, touchdowns: 0.18, receiving: 0.15, recYards: 0.12, ballSecurity: 0.12, efficiency: 0.15 };
    Object.entries(w).forEach(([k, v]) => { weightedSum += (components[k] || 50) * v; totalWeight += v; });
  } else if (pos === "WR") {
    components.receptions = percentileScore(stats.rec || 0, b.rec);
    components.yards = percentileScore(stats.rec_yd || 0, b.rec_yd);
    components.touchdowns = percentileScore(stats.rec_td || 0, b.rec_td);
    components.targets = percentileScore(stats.rec_tgt || 0, b.rec_tgt);
    const ypr = (stats.rec || 0) > 0 ? (stats.rec_yd || 0) / stats.rec : 0;
    components.efficiency = Math.min(99, Math.max(20, ypr * 5));
    const w = { receptions: 0.2, yards: 0.28, touchdowns: 0.22, targets: 0.15, efficiency: 0.15 };
    Object.entries(w).forEach(([k, v]) => { weightedSum += (components[k] || 50) * v; totalWeight += v; });
  } else if (pos === "TE") {
    components.receptions = percentileScore(stats.rec || 0, b.rec);
    components.yards = percentileScore(stats.rec_yd || 0, b.rec_yd);
    components.touchdowns = percentileScore(stats.rec_td || 0, b.rec_td);
    components.targets = percentileScore(stats.rec_tgt || 0, b.rec_tgt);
    const w = { receptions: 0.25, yards: 0.3, touchdowns: 0.25, targets: 0.2 };
    Object.entries(w).forEach(([k, v]) => { weightedSum += (components[k] || 50) * v; totalWeight += v; });
  }

  const overall = totalWeight > 0 ? Math.round(weightedSum / totalWeight) : 50;
  return { overall: Math.min(99, Math.max(1, overall)), components, label: gradeLabel(overall) };
}

// ══════════════════════════════════════════════════════════════════
// ── SOCIAL SENTIMENT ENGINE (Google News RSS → keyword scoring)
// ══════════════════════════════════════════════════════════════════

const POSITIVE_KW = ["breakout","elite","dominant","career high","record","star","surge","boom","top","best","mvp","pro bowl","extension","deal","clutch","explosive","unstoppable","rising"];
const NEGATIVE_KW = ["injury","injured","bust","decline","drop","worst","benched","cut","suspend","arrested","questionable","doubt","concern","struggle","fumble","interception","hamstring","acl","concussion","limited","downgrade","out for"];

async function fetchPlayerSentiment(playerName) {
  try {
    const q = encodeURIComponent(playerName + " NFL");
    const rssUrl = `https://news.google.com/rss/search?q=${q}&hl=en-US&gl=US&ceid=US:en`;
    const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
    const res = await fetch(apiUrl, { signal: AbortSignal.timeout(8000) });
    if (!res.ok) return { score: 0, headlines: [], volume: 0, narrative: "No data available" };
    const data = await res.json();
    if (data.status !== "ok" || !data.items) return { score: 0, headlines: [], volume: 0, narrative: "No articles found" };

    const now = Date.now();
    const weekAgo = now - 7 * 86400000;
    const articles = data.items.map(item => {
      const title = (item.title || "").replace(/\s+-\s+[^-]+$/, "");
      const source = (item.title || "").match(/\s+-\s+(.+)$/) ? RegExp.$1 : "News";
      const date = new Date(item.pubDate || 0);
      return { title, source, date, link: item.link, isRecent: date.getTime() > weekAgo };
    });

    const recentArticles = articles.filter(a => a.isRecent);
    let posCount = 0, negCount = 0;
    articles.forEach(a => {
      const t = a.title.toLowerCase();
      POSITIVE_KW.forEach(kw => { if (t.includes(kw)) posCount++; });
      NEGATIVE_KW.forEach(kw => { if (t.includes(kw)) negCount++; });
    });

    const total = posCount + negCount || 1;
    const score = Math.round(((posCount - negCount) / total) * 100);

    // Generate narrative from keyword patterns
    let narrative = "";
    if (posCount > negCount * 2) narrative = "Strong positive buzz. Media narrative is overwhelmingly favorable.";
    else if (posCount > negCount) narrative = "Positive sentiment. More upside mentions than concerns.";
    else if (negCount > posCount * 2) narrative = "Significant negative buzz. Injury or performance concerns dominate.";
    else if (negCount > posCount) narrative = "Negative sentiment. Concerns outweigh positive coverage.";
    else narrative = "Neutral coverage. No strong directional narrative.";

    return { score: Math.max(-100, Math.min(100, score)), headlines: articles.slice(0, 8), volume: recentArticles.length, narrative };
  } catch(e) {
    return { score: 0, headlines: [], volume: 0, narrative: "Sentiment unavailable" };
  }
}

// ══════════════════════════════════════════════════════════════════
// ── MULTI-WEEK PATTERN ANALYSIS ENGINE
// ══════════════════════════════════════════════════════════════════

async function fetchMultiWeekStats(playerId, currentWeek) {
  const weeks = [];
  const fetchWeeks = Math.min(currentWeek, 8);
  const promises = [];
  for (let w = Math.max(1, currentWeek - fetchWeeks + 1); w <= currentWeek; w++) {
    promises.push(getWeeklyStats(w).then(data => ({ week: w, stats: data[playerId] || null })));
  }
  const results = await Promise.allSettled(promises);
  results.forEach(r => { if (r.status === "fulfilled" && r.value) weeks.push(r.value); });
  weeks.sort((a, b) => a.week - b.week);
  return weeks;
}

function analyzePatterns(weeklyData, pos, scoring = "ppr") {
  if (!weeklyData || weeklyData.length < 2) return { trend: "INSUFFICIENT DATA", trendDir: 0, variance: 0, weeklyPts: [], signal: "HOLD", confidence: 0, sparkline: [] };

  const pts = weeklyData.map(w => w.stats ? calcFantasyPts(w.stats, scoring) : 0);
  const mean = pts.reduce((a, b) => a + b, 0) / pts.length;
  const variance = pts.reduce((sum, p) => sum + Math.pow(p - mean, 2), 0) / pts.length;
  const stdDev = Math.sqrt(variance);
  const cv = mean > 0 ? stdDev / mean : 0; // coefficient of variation

  // Trend detection: linear regression slope
  const n = pts.length;
  const xMean = (n - 1) / 2;
  let num = 0, den = 0;
  pts.forEach((y, x) => { num += (x - xMean) * (y - mean); den += (x - xMean) ** 2; });
  const slope = den > 0 ? num / den : 0;
  const slopeNorm = mean > 0 ? slope / mean : 0;

  // Consecutive week analysis
  let consUp = 0, consDown = 0, maxConsUp = 0, maxConsDown = 0;
  for (let i = 1; i < pts.length; i++) {
    if (pts[i] > pts[i - 1] + 1) { consUp++; consDown = 0; }
    else if (pts[i] < pts[i - 1] - 1) { consDown++; consUp = 0; }
    else { consUp = 0; consDown = 0; }
    maxConsUp = Math.max(maxConsUp, consUp);
    maxConsDown = Math.max(maxConsDown, consDown);
  }

  // Recent vs season comparison (last 3 vs all)
  const recent = pts.slice(-3);
  const recentMean = recent.reduce((a, b) => a + b, 0) / recent.length;
  const recentVsSeason = mean > 0 ? (recentMean - mean) / mean : 0;

  // Determine trend
  let trend, trendDir;
  if (slopeNorm > 0.08 || maxConsUp >= 3) { trend = "TRENDING UP"; trendDir = 1; }
  else if (slopeNorm < -0.08 || maxConsDown >= 3) { trend = "TRENDING DOWN"; trendDir = -1; }
  else if (cv > 0.5) { trend = "BOOM/BUST"; trendDir = 0; }
  else if (cv < 0.2 && mean > 8) { trend = "CONSISTENT"; trendDir = 0; }
  else { trend = "STABLE"; trendDir = 0; }

  // Buy/sell/hold signal
  let signal, confidence;
  if (trendDir === -1 && recentVsSeason < -0.15) { signal = "BUY LOW"; confidence = Math.min(95, Math.round(Math.abs(recentVsSeason) * 200)); }
  else if (trendDir === 1 && recentVsSeason > 0.2) { signal = "SELL HIGH"; confidence = Math.min(95, Math.round(recentVsSeason * 200)); }
  else if (trendDir === 1) { signal = "HOLD/BUY"; confidence = Math.min(80, 50 + Math.round(slopeNorm * 300)); }
  else if (trendDir === -1) { signal = "HOLD/SELL"; confidence = Math.min(80, 50 + Math.round(Math.abs(slopeNorm) * 300)); }
  else { signal = "HOLD"; confidence = 40 + Math.round((1 - cv) * 30); }

  const maxPt = Math.max(...pts, 1);
  const sparkline = pts.map(p => Math.round((p / maxPt) * 100));

  return { trend, trendDir, variance: Math.round(variance * 10) / 10, stdDev: Math.round(stdDev * 10) / 10, mean: Math.round(mean * 10) / 10, weeklyPts: pts, signal, confidence: Math.max(10, Math.min(99, confidence)), sparkline, recentMean: Math.round(recentMean * 10) / 10, slope: Math.round(slope * 100) / 100, cv: Math.round(cv * 100) / 100 };
}

const Sparkline = ({ data, height = 28, color = "#16a34a", showDots = false }) => {
  if (!data || data.length < 2) return <span style={{ fontSize: 10, color: C.meta }}>—</span>;
  const max = Math.max(...data, 1);

    <div style={{ display: "flex", alignItems: "flex-end", gap: 1, height }}>

          <div key={i} style={{ position: "relative" }}>

          <div style={{ textAlign: "center" }}>
            <div style={{ fontSize: 20, fontWeight: 800, color: dynastyScore >= 70 ? "#16a34a" : dynastyScore >= 45 ? C.gold : "#dc2626", lineHeight: 1 }}>{dynastyScore}</div>
            <div style={{ fontSize: 8, fontWeight: 600, color: C.meta }}>DYNASTY</div>
          </div>
        </div>
      </div>

      {/* Stat Grid */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 6, marginBottom: 10 }}>
        {[
          { label: "Actual", value: actual.toFixed(1), color: actual > 15 ? "#16a34a" : C.navy },
          { label: "Projected", value: projected.toFixed(1), color: "#2563eb" },
          { label: "Ceiling", value: ceilingFloor.ceiling.toFixed(1), color: "#16a34a" },
          { label: "Floor", value: ceilingFloor.floor.toFixed(1), color: "#dc2626" },
          { label: "Grade", value: grade.overall.toString(), color: gradeColor(grade.overall) },
          { label: trajectory, value: peakWindow > 0 ? `${peakWindow}yr` : "—", color: trajColor },
        ].map(({ label, value, color }) => (
          <div key={label} style={{ textAlign: "center", padding: "5px 2px", backgroundColor: "#f9fafb", borderRadius: 4, border: "1px solid #f3f4f6" }}>
            <div style={{ fontSize: 14, fontWeight: 700, color, fontFamily: "monospace" }}>{value}</div>
            <div style={{ fontSize: 8, color: C.meta, fontWeight: 600, letterSpacing: 0.3 }}>{label}</div>
          </div>
        ))}
      </div>

      {/* Grade Components */}
      {Object.keys(grade.components).length > 0 && (
        <div style={{ display: "flex", gap: 4, marginBottom: 10, flexWrap: "wrap" }}>
          {Object.entries(grade.components).map(([key, val]) => (
            <div key={key} style={{ flex: 1, minWidth: 60, padding: "4px 6px", backgroundColor: "#f9fafb", borderRadius: 4, borderLeft: `3px solid ${gradeColor(val)}`, textAlign: "center" }}>
              <div style={{ fontSize: 12, fontWeight: 700, fontFamily: "monospace", color: gradeColor(val) }}>{Math.round(val)}</div>
              <div style={{ fontSize: 8, color: C.meta, textTransform: "uppercase" }}>{key}</div>
            </div>
          ))}
        </div>
      )}

      {/* Raw Stats (position-specific, Karpathy dense) */}
      <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginBottom: 10, padding: "6px 8px", backgroundColor: "#f9fafb", borderRadius: 4, border: "1px solid #f3f4f6" }}>
        {pos === "QB" && <><StatChip l="Pass" v={`${st.pass_yd||0}yd`} /><StatChip l="TD" v={st.pass_td||0} good /><StatChip l="INT" v={st.pass_int||0} bad /><StatChip l="Rush" v={`${st.rush_yd||0}yd`} /><StatChip l="Cmp%" v={st.pass_att > 0 ? `${Math.round(((st.pass_cmp||0)/st.pass_att)*100)}%` : "—"} /></>}
        {pos === "RB" && <><StatChip l="Rush" v={`${st.rush_yd||0}yd`} /><StatChip l="TD" v={st.rush_td||0} good /><StatChip l="YPC" v={st.rush_att > 0 ? (st.rush_yd/st.rush_att).toFixed(1) : "—"} /><StatChip l="Rec" v={st.rec||0} /><StatChip l="RecYd" v={st.rec_yd||0} /><StatChip l="Fum" v={st.fum_lost||0} bad /></>}
        {(pos === "WR" || pos === "TE") && <><StatChip l="Rec" v={st.rec||0} /><StatChip l="Yd" v={st.rec_yd||0} /><StatChip l="TD" v={st.rec_td||0} good /><StatChip l="Tgt" v={st.rec_tgt||"?"} /><StatChip l="Y/R" v={st.rec > 0 ? ((st.rec_yd||0)/st.rec).toFixed(1) : "—"} /></>}
      </div>

      {/* Pattern Analysis (loaded async) */}
      {loadingIntel ? (
        <div className="loading-pulse" style={{ padding: 8, fontSize: 10, color: C.meta }}>Loading intelligence (multi-week stats + news sentiment)...</div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          <PatternDisplay patterns={patterns} />
          <SocialBuzz playerName={`${player.first_name} ${player.last_name}`} />
        </div>
      )}

      {/* Scouting Report */}
      <div style={{ marginTop: 10, padding: "8px 10px", backgroundColor: "#f0fdf4", borderRadius: 4, fontSize: 11, color: "#065f46", lineHeight: 1.6, borderLeft: `3px solid ${trajColor}` }}>
        <strong>Scout Report:</strong> {
          grade.overall >= 80 ? `Elite-tier ${pos}. Grade of ${grade.overall} ranks among the top producers at the position. ` :
          grade.overall >= 60 ? `Solid starter-level ${pos}. Composite grade of ${grade.overall} shows reliable production. ` :
          `Below-average production for a ${pos}. Grade of ${grade.overall} suggests limited fantasy upside. `
        }
        {trajectory === "ASCENDING" ? `At ${age}, still ${peakWindow} years from theoretical prime — high dynasty ceiling. ${projected > 12 ? "Already producing at a starter level while ascending." : "Production may lag talent; stash candidate."}` :
         trajectory === "PRIME" ? `Peak production window NOW. ${pos === "RB" ? "RB shelf life is short — maximize or sell." : "Maximize as weekly starter for 2-3 more years."}` :
         trajectory === "DECLINING" ? `Past prime at ${age}. ${pos === "QB" ? "QBs age well — could produce 3-5 more years." : "Sell for youth if rebuilding."}` :
         `Late career asset. Limited long-term value — trade for picks if not contending.`}
        {patterns && patterns.signal === "BUY LOW" ? " PATTERN: Recent underperformance vs. season baseline — buy-low window." : ""}
        {patterns && patterns.signal === "SELL HIGH" ? " PATTERN: Recent surge above baseline — sell-high window before regression." : ""}
        {sentiment && sentiment.score > 40 ? " BUZZ: Overwhelmingly positive media narrative supports upside." : ""}
        {sentiment && sentiment.score < -40 ? " BUZZ: Negative media narrative — investigate before buying." : ""}
      </div>
    </div>
  );
};

// Helper: stat chip for dense display

// ── League Setup Panel ──
const LeagueSetup = ({ profile, onSave }) => {
  const leagues = useMemo(() => {
    try { return JSON.parse(profile.fantasyLeagues || "[]"); }
    catch(e) { return []; }
  }, [profile.fantasyLeagues]);
  const [draft, setDraft] = useState(leagues);
  const [username, setUsername] = useState(profile.sleeperUsername || "");
  const [lookupStatus, setLookupStatus] = useState(null);

  const updateLeague = (idx, field, val) => {
    setDraft(d => d.map((l, i) => i === idx ? { ...l, [field]: val } : l));
  };

  const lookupUser = async () => {
    if (!username.trim()) return;
    setLookupStatus("Looking up...");
    try {
      const user = await sleeperGet(`/user/${username.trim()}`);
      if (!user || !user.user_id) { setLookupStatus("User not found"); return; }
      setLookupStatus(`Found: ${user.display_name} (ID: ${user.user_id})`);
      const userLeagues = await sleeperGet(`/user/${user.user_id}/leagues/nfl/${NFL_SEASON}`);
      if (userLeagues && userLeagues.length > 0) {
        const newDraft = userLeagues.slice(0, 4).map((lg, i) => ({
          id: lg.league_id,
          name: lg.name || `League ${i + 1}`,
          isCommissioner: lg.owner_id === user.user_id || (lg.metadata && lg.metadata.auto_continue === "true" && i === 0),
        }));
        while (newDraft.length < 4) newDraft.push({ id: "", name: `League ${newDraft.length + 1}`, isCommissioner: false });
        setDraft(newDraft);
        setLookupStatus(`Found ${userLeagues.length} league(s) — showing first ${Math.min(4, userLeagues.length)}`);
      } else {
        setLookupStatus("No NFL leagues found for this season.");
      }
    } catch(e) { setLookupStatus("Lookup failed: " + e.message); }
  };

  const handleSave = () => {
    onSave({ ...profile, fantasyLeagues: JSON.stringify(draft), sleeperUsername: username });
  };

  return (
    <div className="fade-in" style={{ margin: "10px 16px", padding: "16px 20px", backgroundColor: "#fff", border: "2px solid #16a34a", borderRadius: 8 }}>
      <div style={{ fontSize: 15, fontWeight: 700, color: C.navy, marginBottom: 4 }}>🏈 Fantasy League Setup</div>
      <div style={{ fontSize: 12, color: C.meta, marginBottom: 14, lineHeight: 1.5 }}>
        Enter your Sleeper username to auto-detect leagues, or paste league IDs manually. All data comes from the <a href="https://docs.sleeper.com" target="_blank" style={{ color: C.blue }}>Sleeper API</a> — free and real-time.
      </div>

      <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
        <input value={username} onChange={e => setUsername(e.target.value)} placeholder="Sleeper username"
          onKeyDown={e => { if (e.key === "Enter") lookupUser(); }}
          style={{ flex: 1, padding: "7px 10px", fontSize: 13, border: "1px solid #d1d5db", borderRadius: 4, fontFamily: "inherit" }} />
        <button onClick={lookupUser} style={{
          padding: "7px 16px", backgroundColor: "#16a34a", color: "#fff", border: "none",
          borderRadius: 4, fontSize: 12, fontWeight: 600, cursor: "pointer"
        }}>Auto-Detect Leagues</button>
      </div>
      {lookupStatus && <div style={{ fontSize: 11, color: lookupStatus.includes("Found") ? "#16a34a" : "#dc2626", marginBottom: 10 }}>{lookupStatus}</div>}

      <div style={{ fontSize: 11, fontWeight: 600, color: C.navy, marginBottom: 6 }}>Your Leagues</div>
      {draft.map((lg, i) => (
        <div key={i} style={{ display: "flex", gap: 8, marginBottom: 8, alignItems: "center" }}>
          <input value={lg.name} onChange={e => updateLeague(i, "name", e.target.value)}
            style={{ width: 160, padding: "5px 8px", fontSize: 12, border: "1px solid #d1d5db", borderRadius: 4 }}
            placeholder={`League ${i + 1} name`} />
          <input value={lg.id} onChange={e => updateLeague(i, "id", e.target.value)}
            style={{ flex: 1, padding: "5px 8px", fontSize: 12, border: "1px solid #d1d5db", borderRadius: 4, fontFamily: "monospace" }}
            placeholder="Sleeper League ID" />
          <label style={{ fontSize: 11, color: C.meta, display: "flex", alignItems: "center", gap: 4, cursor: "pointer", whiteSpace: "nowrap" }}>
            <input type="checkbox" checked={lg.isCommissioner || false} onChange={e => updateLeague(i, "isCommissioner", e.target.checked)} />
            Commish
          </label>
        </div>
      ))}

      <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
        <button onClick={handleSave} style={{
          padding: "8px 24px", backgroundColor: C.navy, color: "#fff", border: "none",
          borderRadius: 4, fontSize: 13, fontWeight: 600, cursor: "pointer"
        }}>Save Leagues</button>
      </div>
    </div>
  );
};

// ── League Dashboard (roster + scoring) ──
const LeagueDashboard = ({ leagueId, leagueName, isCommissioner, sleeperUsername }) => {
  const [league, setLeague] = useState(null);
  const [rosters, setRosters] = useState([]);
  const [users, setUsers] = useState({});
  const [players, setPlayers] = useState({});
  const [stats, setStats] = useState({});
  const [projections, setProjections] = useState({});
  const [myRoster, setMyRoster] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [week, setWeek] = useState(1);
  const [showAll, setShowAll] = useState(false);

  useEffect(() => {
    if (!leagueId) { setLoading(false); setError("No league ID"); return; }
    setLoading(true); setError(null);
    Promise.all([
      sleeperGet(`/league/${leagueId}`),
      sleeperGet(`/league/${leagueId}/rosters`),
      sleeperGet(`/league/${leagueId}/users`),
      getAllPlayers(),
    ]).then(async ([lg, ros, usr, plrs]) => {
      setLeague(lg);
      setRosters(ros);
      setPlayers(plrs);
      const usrMap = {};
      (usr || []).forEach(u => { usrMap[u.user_id] = u; });
      setUsers(usrMap);

      // Determine current week from league
      const w = lg.settings && lg.settings.leg ? lg.settings.leg : 1;
      setWeek(w);

      // Try to find Brian's roster
      const slpUser = sleeperUsername ? await sleeperGet(`/user/${sleeperUsername}`).catch(() => null) : null;
      if (slpUser) {
        const mine = ros.find(r => r.owner_id === slpUser.user_id);
        setMyRoster(mine || null);
      }

      // Fetch stats and projections for current week
      try {
        const [st, proj] = await Promise.all([
          sleeperGet(`/stats/nfl/regular/${NFL_SEASON}/${w}`).catch(() => ({})),
          sleeperGet(`/projections/nfl/regular/${NFL_SEASON}/${w}`).catch(() => ({})),
        ]);
        setStats(st || {});
        setProjections(proj || {});
      } catch(e) {}

      setLoading(false);
    }).catch(e => { setError(e.message); setLoading(false); });
  }, [leagueId, sleeperUsername]);

  if (loading) return <div className="loading-pulse" style={{ padding: 20, fontSize: 13, color: C.meta }}>Loading {leagueName}...</div>;
  if (error) return <div style={{ padding: 16, fontSize: 13, color: "#dc2626" }}>Error loading league: {error}</div>;
  if (!league) return null;

  const scoring = league.scoring_settings || {};
  const isPPR = scoring.rec === 1 ? "ppr" : scoring.rec === 0.5 ? "half_ppr" : "standard";

  // Build standings
  const standings = rosters.map(r => {
    const user = users[r.owner_id] || {};
    const wins = r.settings ? r.settings.wins || 0 : 0;
    const losses = r.settings ? r.settings.losses || 0 : 0;
    const fpts = r.settings ? (r.settings.fpts || 0) + (r.settings.fpts_decimal || 0) / 100 : 0;
    return { ...r, displayName: user.display_name || `Team ${r.roster_id}`, wins, losses, fpts, avatar: user.avatar };
  }).sort((a, b) => b.wins - a.wins || b.fpts - a.fpts);

  const renderPlayer = (pid, isStarter) => {
    const p = players[pid];
    if (!p) return <span style={{ fontSize: 11, color: C.meta }}>Unknown ({pid})</span>;
    const st = stats[pid] || {};
    const proj = projections[pid] || {};
    const actual = calcFantasyPts(st, isPPR);
    const projected = calcFantasyPts(proj, isPPR);
    const pos = p.position || "?";
    const team = p.team || "FA";
    const statusColor = p.injury_status === "Out" ? "#dc2626" : p.injury_status === "Questionable" ? "#f59e0b" : p.injury_status === "Doubtful" ? "#dc2626" : "transparent";

    return (
      <div key={pid} style={{
        display: "flex", alignItems: "center", gap: 8, padding: "4px 0",
        borderBottom: "1px solid #f3f4f6", opacity: isStarter ? 1 : 0.6,
      }}>
        <span style={{
          display: "inline-block", width: 28, fontSize: 10, fontWeight: 700, textAlign: "center",
          padding: "2px 0", borderRadius: 3, backgroundColor: POS_COLORS[pos] || "#94a3b8", color: "#fff"
        }}>{pos}</span>
        <span style={{ flex: 1, fontSize: 12, fontWeight: isStarter ? 600 : 400 }}>
          {p.first_name ? `${p.first_name.charAt(0)}. ${p.last_name}` : p.last_name || pid}
          <span style={{ fontSize: 10, color: C.meta, marginLeft: 4 }}>{team}</span>
          {p.injury_status && <span style={{ fontSize: 9, color: statusColor, marginLeft: 4, fontWeight: 600 }}>{p.injury_status}</span>}
        </span>
        <span style={{ fontSize: 11, fontWeight: 600, color: actual > 0 ? "#16a34a" : C.meta, minWidth: 36, textAlign: "right" }}>
          {actual > 0 ? actual.toFixed(1) : "—"}
        </span>
        <span style={{ fontSize: 10, color: C.meta, minWidth: 36, textAlign: "right" }}>
          ({projected > 0 ? projected.toFixed(1) : "—"})
        </span>
      </div>
    );
  };

  const rosterToShow = showAll ? standings : (myRoster ? [{ ...myRoster, displayName: "Your Team", wins: myRoster.settings?.wins || 0, losses: myRoster.settings?.losses || 0, fpts: (myRoster.settings?.fpts || 0) + (myRoster.settings?.fpts_decimal || 0) / 100 }] : standings.slice(0, 1));

  return (
    <div className="fade-in" style={{ margin: "8px 0" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
        <div>
          <span style={{ fontSize: 14, fontWeight: 700, color: C.navy }}>{leagueName}</span>
          {isCommissioner && <span style={{ fontSize: 9, backgroundColor: "#fef3c7", color: "#92400e", padding: "2px 6px", borderRadius: 3, marginLeft: 8, fontWeight: 600 }}>COMMISSIONER</span>}
          <span style={{ fontSize: 10, color: C.meta, marginLeft: 8 }}>{league.total_rosters} teams · {isPPR.replace("_", " ").toUpperCase()} · Week {week}</span>
        </div>
        <div style={{ display: "flex", gap: 4 }}>
          <button onClick={() => setShowAll(false)} style={{ fontSize: 10, padding: "3px 8px", borderRadius: 3, border: !showAll ? "none" : "1px solid #d1d5db", backgroundColor: !showAll ? C.navy : "#fff", color: !showAll ? "#fff" : C.meta, cursor: "pointer" }}>My Team</button>
          <button onClick={() => setShowAll(true)} style={{ fontSize: 10, padding: "3px 8px", borderRadius: 3, border: showAll ? "none" : "1px solid #d1d5db", backgroundColor: showAll ? C.navy : "#fff", color: showAll ? "#fff" : C.meta, cursor: "pointer" }}>Standings</button>
        </div>
      </div>

      {showAll ? (
        <div style={{ backgroundColor: "#fff", border: "1px solid #e5e7eb", borderRadius: 6, overflow: "hidden" }}>
          <div style={{ display: "grid", gridTemplateColumns: "30px 1fr 50px 50px 70px", padding: "6px 10px", fontSize: 10, fontWeight: 600, color: C.meta, borderBottom: "1px solid #e5e7eb", backgroundColor: "#f9fafb" }}>
            <span>#</span><span>Team</span><span style={{ textAlign: "right" }}>W</span><span style={{ textAlign: "right" }}>L</span><span style={{ textAlign: "right" }}>Pts For</span>
          </div>
          {standings.map((r, i) => (
            <div key={r.roster_id} style={{ display: "grid", gridTemplateColumns: "30px 1fr 50px 50px 70px", padding: "5px 10px", fontSize: 12, borderBottom: "1px solid #f3f4f6", backgroundColor: myRoster && r.roster_id === myRoster.roster_id ? "#eff6ff" : "transparent" }}>
              <span style={{ fontWeight: 600, color: C.meta }}>{i + 1}</span>
              <span style={{ fontWeight: myRoster && r.roster_id === myRoster.roster_id ? 700 : 400 }}>{r.displayName}</span>
              <span style={{ textAlign: "right", fontWeight: 600, color: "#16a34a" }}>{r.wins}</span>
              <span style={{ textAlign: "right", color: "#dc2626" }}>{r.losses}</span>
              <span style={{ textAlign: "right", fontFamily: "monospace", fontSize: 11 }}>{r.fpts.toFixed(1)}</span>
            </div>
          ))}
        </div>
      ) : (
        rosterToShow.map(r => {
          const starters = r.starters || [];
          const bench = (r.players || []).filter(p => !starters.includes(p));
          const starterPts = starters.reduce((sum, pid) => sum + calcFantasyPts(stats[pid] || {}, isPPR), 0);
          const projPts = starters.reduce((sum, pid) => sum + calcFantasyPts(projections[pid] || {}, isPPR), 0);
          return (
            <div key={r.roster_id} style={{ backgroundColor: "#fff", border: "1px solid #e5e7eb", borderRadius: 6, padding: "12px 14px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <span style={{ fontSize: 13, fontWeight: 700 }}>{r.displayName} <span style={{ color: C.meta, fontWeight: 400, fontSize: 11 }}>({r.wins}-{r.losses})</span></span>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 20, fontWeight: 800, color: starterPts > 0 ? "#16a34a" : C.navy }}>{starterPts.toFixed(1)}</div>
                  <div style={{ fontSize: 10, color: C.meta }}>Proj: {projPts.toFixed(1)}</div>
                </div>
              </div>
              <div style={{ fontSize: 10, fontWeight: 600, color: C.meta, marginBottom: 4, display: "flex", justifyContent: "space-between" }}>
                <span>STARTERS</span><span>Actual (Proj)</span>
              </div>
              {starters.map(pid => renderPlayer(pid, true))}
              {bench.length > 0 && (
                <div>
                  <div style={{ fontSize: 10, fontWeight: 600, color: C.meta, marginTop: 8, marginBottom: 4 }}>BENCH</div>
                  {bench.slice(0, 8).map(pid => renderPlayer(pid, false))}
                  {bench.length > 8 && <div style={{ fontSize: 10, color: C.meta, marginTop: 4 }}>+{bench.length - 8} more</div>}
                </div>
              )}
            </div>
          );
        })
      )}
    </div>
  );
};

// ══════════════════════════════════════════════════════════════════
// ── ENHANCED TRADE ANALYZER (multi-signal: projections + grade + trend + age)
// ══════════════════════════════════════════════════════════════════

const TradeAnalyzer = ({ players, stats, projections, currentWeek }) => {
  const [sideA, setSideA] = useState([]);
  const [sideB, setSideB] = useState([]);
  const [searchA, setSearchA] = useState("");
  const [searchB, setSearchB] = useState("");
  const [resultsA, setResultsA] = useState([]);
  const [resultsB, setResultsB] = useState([]);
  const [playerGrades, setPlayerGrades] = useState({});

  const searchPlayers = (query) => {
    if (!query || query.length < 2 || !players) return [];
    const q = query.toLowerCase();
    return Object.entries(players)
      .filter(([id, p]) => (p.status === "Active" || p.active === true || (p.team && p.team !== "")) &&
        p.position && ["QB","RB","WR","TE","K"].includes(p.position) &&
        (`${p.first_name || ""} ${p.last_name || ""}`.toLowerCase().includes(q) || (p.team || "").toLowerCase().includes(q)))
      .slice(0, 8)
      .map(([id, p]) => ({ id, ...p }));
  };

  useEffect(() => { setResultsA(searchPlayers(searchA)); }, [searchA, players]);
  useEffect(() => { setResultsB(searchPlayers(searchB)); }, [searchB, players]);

  const addPlayer = (side, player) => {
    const st = stats[player.id] || {};
    const grade = computeCompositeGrade(st, player.position);
    setPlayerGrades(g => ({ ...g, [player.id]: grade }));
    if (side === "A") { setSideA(s => [...s, player]); setSearchA(""); setResultsA([]); }
    else { setSideB(s => [...s, player]); setSearchB(""); setResultsB([]); }
  };

  const getPlayerValue = (p) => {
    const st = stats[p.id] || {};
    const proj = projections[p.id] || {};
    const projected = calcFantasyPts(proj, "ppr");
    const actual = calcFantasyPts(st, "ppr");
    const grade = playerGrades[p.id] || computeCompositeGrade(st, p.position);
    const age = p.age || 0;
    const primeAge = p.position === "QB" ? 30 : p.position === "RB" ? 25 : p.position === "WR" ? 27 : 28;
    const peakYrs = Math.max(0, primeAge - age);
    // Composite trade value: weighted sum of production + grade + youth
    const tradeValue = (projected * 2) + (grade.overall * 0.5) + (peakYrs * 1.5);
    return { actual, projected, grade, age, peakYrs, tradeValue, team: p.team || "FA", pos: p.position };
  };

  const totalTradeValue = (side) => side.reduce((s, p) => s + getPlayerValue(p).tradeValue, 0);
  const totalProj = (side) => side.reduce((s, p) => s + getPlayerValue(p).projected, 0);

  const renderSide = (side, setSide, search, setSearch, results, label, sideKey) => (
    <div style={{ flex: 1, minWidth: 220 }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: C.navy, marginBottom: 6 }}>{label}</div>
      <div style={{ position: "relative", marginBottom: 8 }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search player or team..."
          style={{ width: "100%", padding: "6px 10px", fontSize: 12, border: "1px solid #d1d5db", borderRadius: 4 }} />
        {results.length > 0 && (
          <div style={{ position: "absolute", top: "100%", left: 0, right: 0, backgroundColor: "#fff", border: "1px solid #d1d5db", borderRadius: 4, zIndex: 10, maxHeight: 200, overflow: "auto", boxShadow: "0 4px 12px rgba(0,0,0,0.1)" }}>
            {results.map(p => (
              <div key={p.id} onClick={() => addPlayer(sideKey, p)}
                style={{ padding: "6px 10px", fontSize: 12, cursor: "pointer", borderBottom: "1px solid #f3f4f6", display: "flex", gap: 6, alignItems: "center" }}
                onMouseOver={e => e.currentTarget.style.backgroundColor = "#f0fdf4"}
                onMouseOut={e => e.currentTarget.style.backgroundColor = "#fff"}>
                <span style={{ fontSize: 10, fontWeight: 700, color: POS_COLORS[p.position] || C.meta }}>{p.position}</span>
                <span>{p.first_name} {p.last_name}</span>
                <span style={{ fontSize: 10, color: C.meta }}>{p.team}</span>
              </div>
            ))}
          </div>
        )}
      </div>
      {side.map((p, i) => {
        const v = getPlayerValue(p);
        return (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 4, padding: "5px 8px", marginBottom: 4, backgroundColor: "#f9fafb", borderRadius: 4, border: "1px solid #e5e7eb" }}>
            <span style={{ fontSize: 10, fontWeight: 700, color: POS_COLORS[v.pos] || C.meta, width: 22 }}>{v.pos}</span>
            <span style={{ flex: 1, fontSize: 11, fontWeight: 600 }}>{p.first_name} {p.last_name} <span style={{ fontSize: 9, color: C.meta }}>{v.team} · {v.age}yo</span></span>
            <GradeRing grade={v.grade.overall} size={26} />
            <span style={{ fontSize: 11, fontFamily: "monospace", color: "#2563eb", minWidth: 30, textAlign: "right" }}>{v.projected.toFixed(1)}</span>
            <span onClick={() => setSide(s => s.filter((_, j) => j !== i))} style={{ fontSize: 14, color: "#dc2626", cursor: "pointer" }}>×</span>
          </div>
        );
      })}
      {side.length > 0 && (
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6, fontSize: 11, fontWeight: 700 }}>
          <span style={{ color: C.meta }}>Proj: <span style={{ fontFamily: "monospace", color: "#2563eb" }}>{totalProj(side).toFixed(1)}</span></span>
          <span style={{ color: C.navy }}>Value: <span style={{ fontFamily: "monospace" }}>{totalTradeValue(side).toFixed(0)}</span></span>
        </div>
      )}
    </div>
  );

  const valDiff = totalTradeValue(sideB) - totalTradeValue(sideA);
  const projDiff = totalProj(sideB) - totalProj(sideA);
  const hasPlayers = sideA.length > 0 || sideB.length > 0;

  // Smart verdict considers both current production and long-term value
  let verdict, verdictDetail, verdictColor;
  if (!hasPlayers) { verdict = ""; verdictColor = C.meta; verdictDetail = ""; }
  else if (Math.abs(valDiff) < 5 && Math.abs(projDiff) < 2) { verdict = "FAIR TRADE"; verdictColor = "#6b7280"; verdictDetail = "Even value — comes down to team needs."; }
  else if (valDiff > 10 && projDiff > 0) { verdict = "STRONG WIN"; verdictColor = "#16a34a"; verdictDetail = `You gain ${projDiff.toFixed(1)} pts/wk AND superior long-term value (+${valDiff.toFixed(0)}).`; }
  else if (valDiff > 5) { verdict = "YOU WIN"; verdictColor = "#22c55e"; verdictDetail = projDiff < 0 ? `Short-term loss (${projDiff.toFixed(1)} pts/wk) but long-term value gain (+${valDiff.toFixed(0)}). Dynasty play.` : `You gain both production (+${projDiff.toFixed(1)}) and value (+${valDiff.toFixed(0)}).`; }
  else if (valDiff < -10 && projDiff < 0) { verdict = "STRONG LOSS"; verdictColor = "#dc2626"; verdictDetail = `You lose ${Math.abs(projDiff).toFixed(1)} pts/wk AND long-term value (${valDiff.toFixed(0)}). Avoid.`; }
  else if (valDiff < -5) { verdict = "YOU LOSE"; verdictColor = "#f97316"; verdictDetail = projDiff > 0 ? `Short-term gain (+${projDiff.toFixed(1)} pts/wk) but you're selling low on long-term value (${valDiff.toFixed(0)}). Win-now move.` : `Negative on both axes. Reconsider.`; }
  else { verdict = "MARGINAL"; verdictColor = "#f59e0b"; verdictDetail = "Close call — consider your team's competitive window."; }

  return (
    <div className="fade-in" style={{ margin: "10px 16px", padding: "16px 20px", backgroundColor: "#fff", border: "1px solid #e5e7eb", borderRadius: 8 }}>
      <div style={{ fontSize: 14, fontWeight: 700, color: C.navy, marginBottom: 2 }}>Trade Analyzer</div>
      <div style={{ fontSize: 11, color: C.meta, marginBottom: 14 }}>Multi-signal analysis: projections + composite grade + age/trajectory + dynasty value.</div>
      <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
        {renderSide(sideA, setSideA, searchA, setSearchA, resultsA, "YOU GIVE", "A")}
        <div style={{ display: "flex", alignItems: "center", fontSize: 20, color: C.meta, padding: "0 4px" }}>⇄</div>
        {renderSide(sideB, setSideB, searchB, setSearchB, resultsB, "YOU GET", "B")}
      </div>
      {hasPlayers && verdict && (
        <div style={{ marginTop: 14, padding: "12px 14px", backgroundColor: verdictColor + "10", borderRadius: 6, textAlign: "center", borderLeft: `4px solid ${verdictColor}` }}>
          <div style={{ fontSize: 18, fontWeight: 800, color: verdictColor }}>{verdict}</div>
          <div style={{ fontSize: 11, color: "#374151", marginTop: 4 }}>{verdictDetail}</div>
          <div style={{ display: "flex", justifyContent: "center", gap: 20, marginTop: 8, fontSize: 10, color: C.meta }}>
            <span>Proj Δ: <strong style={{ fontFamily: "monospace", color: projDiff >= 0 ? "#16a34a" : "#dc2626" }}>{projDiff >= 0 ? "+" : ""}{projDiff.toFixed(1)}</strong> pts/wk</span>
            <span>Value Δ: <strong style={{ fontFamily: "monospace", color: valDiff >= 0 ? "#16a34a" : "#dc2626" }}>{valDiff >= 0 ? "+" : ""}{valDiff.toFixed(0)}</strong></span>
          </div>
        </div>
      )}
    </div>
  );
};

const PlayerScout = ({ players, stats, projections, currentWeek }) => {
  const [query, setQuery] = useState("");
  const [results, setResults] = useState([]);
  const [selected, setSelected] = useState(null);
  const [posFilter, setPosFilter] = useState("ALL");

  const playerCount = useMemo(() => players ? Object.keys(players).length : 0, [players]);

  useEffect(() => {
    if (!query || query.length < 2 || !players || playerCount === 0) { setResults([]); return; }
    const q = query.toLowerCase();
    const matches = Object.entries(players)
      .filter(([id, p]) => {
        // Sleeper uses status="Active" or active=true (varies by version)
        const isActive = p.status === "Active" || p.active === true || (p.team && p.team !== "");
        const validPos = p.position && ["QB","RB","WR","TE","K","DEF"].includes(p.position);
        const posMatch = posFilter === "ALL" || p.position === posFilter;
        const nameMatch = (`${p.first_name || ""} ${p.last_name || ""}`).toLowerCase().includes(q) || (p.team || "").toLowerCase().includes(q);
        return isActive && validPos && posMatch && nameMatch;
      })
      .map(([id, p]) => {
        const st = stats[id] || {};
        const proj = projections[id] || {};
        const grade = computeCompositeGrade(st, p.position);
        const projected = calcFantasyPts(proj, "ppr");
        return { id, ...p, grade, projected };
      })
      .sort((a, b) => b.grade.overall - a.grade.overall || b.projected - a.projected)
      .slice(0, 25);
    setResults(matches);
  }, [query, players, playerCount, posFilter, stats, projections]);

  return (
    <div className="fade-in" style={{ margin: "10px 16px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <div>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.navy }}>Player Intelligence Scout</div>
          <div style={{ fontSize: 11, color: C.meta }}>Multi-signal: composite grade + trend analysis + social sentiment + scouting report</div>
        </div>
      </div>

      <div style={{ display: "flex", gap: 6, marginBottom: 10, marginTop: 10 }}>
        <input value={query} onChange={e => { setQuery(e.target.value); setSelected(null); }} placeholder="Search player name or NFL team..."
          style={{ flex: 1, padding: "8px 12px", fontSize: 13, border: "1px solid #d1d5db", borderRadius: 6 }} />
        {["ALL", "QB", "RB", "WR", "TE"].map(pos => (
          <button key={pos} onClick={() => { setPosFilter(pos); setSelected(null); }} style={{
            padding: "6px 10px", fontSize: 11, fontWeight: posFilter === pos ? 700 : 400, borderRadius: 4,
            backgroundColor: posFilter === pos ? (POS_COLORS[pos] || C.navy) : "#f9fafb",
            color: posFilter === pos ? "#fff" : C.meta, border: posFilter === pos ? "none" : "1px solid #d1d5db", cursor: "pointer"
          }}>{pos}</button>
        ))}
      </div>

      {selected ? (
        <div>
          <div onClick={() => setSelected(null)} style={{ fontSize: 12, color: C.blue, cursor: "pointer", marginBottom: 8 }}>← Back to results</div>
          <PlayerIntelligenceCard player={selected} stats={stats} projections={projections} currentWeek={currentWeek} onClose={() => setSelected(null)} />
        </div>
      ) : results.length > 0 ? (
        <div style={{ backgroundColor: "#fff", border: "1px solid #e5e7eb", borderRadius: 6, overflow: "hidden" }}>
          <div style={{ display: "grid", gridTemplateColumns: "28px 1fr 36px 40px 40px 50px 50px", padding: "6px 10px", fontSize: 9, fontWeight: 600, color: C.meta, borderBottom: "1px solid #e5e7eb", backgroundColor: "#f9fafb", letterSpacing: 0.3 }}>
            <span>POS</span><span>NAME</span><span>TEAM</span><span>AGE</span><span>GRADE</span><span>PROJ</span><span></span>
          </div>
          {results.map(p => (
            <div key={p.id} onClick={() => setSelected(p)} style={{ display: "grid", gridTemplateColumns: "28px 1fr 36px 40px 40px 50px 50px", padding: "5px 10px", fontSize: 12, borderBottom: "1px solid #f3f4f6", alignItems: "center", cursor: "pointer" }}
              onMouseOver={e => e.currentTarget.style.backgroundColor = "#f0fdf4"}
              onMouseOut={e => e.currentTarget.style.backgroundColor = "transparent"}>
              <span style={{ fontSize: 10, fontWeight: 700, color: POS_COLORS[p.position] || C.meta }}>{p.position}</span>
              <span style={{ fontWeight: 600, fontSize: 12 }}>{p.first_name} {p.last_name}
                {p.injury_status && <span style={{ fontSize: 9, color: "#dc2626", marginLeft: 4 }}>{p.injury_status}</span>}
              </span>
              <span style={{ fontSize: 10, color: C.meta }}>{p.team || "FA"}</span>
              <span style={{ fontSize: 10, color: C.meta, fontFamily: "monospace" }}>{p.age || "?"}</span>
              <span style={{ fontSize: 11, fontWeight: 700, fontFamily: "monospace", color: gradeColor(p.grade.overall) }}>{p.grade.overall}</span>
              <span style={{ fontSize: 11, fontFamily: "monospace", color: p.projected > 10 ? "#16a34a" : C.meta }}>{p.projected.toFixed(1)}</span>
              <span style={{ fontSize: 10, color: C.blue, fontWeight: 600 }}>Intel →</span>
            </div>
          ))}
        </div>
      ) : query.length >= 2 ? (
        <div style={{ padding: 20, textAlign: "center", color: C.meta, fontSize: 13 }}>No active players found matching "{query}".</div>
      ) : (
        <div style={{ padding: 30, textAlign: "center", color: C.meta, backgroundColor: "#fff", borderRadius: 6, border: "1px solid #e5e7eb" }}>
          <div style={{ fontSize: 24, marginBottom: 8 }}>🔬</div>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 4 }}>Player Intelligence Database</div>
          <div style={{ fontSize: 12 }}>
            {playerCount > 0
              ? `${playerCount.toLocaleString()} players loaded. Search by name or NFL team for full intelligence.`
              : "Loading player database... (first load takes a few seconds)"}
          </div>
        </div>
      )}
    </div>
  );
};

window.__App = function NorthCountyBeaconLive() {
  const [view, setView] = useState({ type: "home" });
  const [liveStories, setLiveStories] = useState([]);
  const [loading, setLoading] = useState(true);
  const [lastRefresh, setLastRefresh] = useState(null);
  const [activeFilter, setActiveFilter] = useState("All");
  const [profile, setProfile] = useState(() => loadProfile());
  const [showEditor, setShowEditor] = useState(false);
  const [showFeedEditor, setShowFeedEditor] = useState(false);
  const [feedVersion, setFeedVersion] = useState(0);

  // Build dynamic feed list from profile's feedQueries + extraFeeds
  const feedUrls = useMemo(() => {
    const queries = (profile.feedQueries || DEFAULT_FEED_QUERIES.join("\n")).split("\n").filter(Boolean);
    const base = queries.map(buildFeedUrl);
    const extra = (profile.extraFeeds || "").split(",").map(s => s.trim()).filter(Boolean);
    extra.forEach(term => {
      base.push(buildFeedUrl(term));
    });
    return base;
  }, [profile.feedQueries, profile.extraFeeds, feedVersion]);

  useEffect(() => {
    setLoading(true);
    Promise.allSettled(feedUrls.map(url => fetchFeed(url))).then(results => {
      const all = results.flatMap(r => r.status === "fulfilled" ? r.value : []);
      const seen = new Set();
      const unique = all.filter(item => {
        if (!item.title) return false;
        const key = item.title.toLowerCase().replace(/[^a-z0-9]/g, "").slice(0, 40);
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
      unique.sort((a, b) => b.pubDate - a.pubDate);
      const stories = unique.slice(0, 40).map((item, i) => rssToStory(item, 1000 + i));
      setLiveStories(stories);
      setLastRefresh(new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" }));
      setLoading(false);
    }).catch(() => {
      setLoading(false);
      setLastRefresh("feeds unavailable — showing featured stories");
    });
  }, [feedUrls]);

  const handleSaveProfile = useCallback((newProfile) => {
    BRIAN = { ...newProfile };
    setProfile(newProfile);
    saveProfile(newProfile);
    setShowEditor(false);
    setShowFeedEditor(false);
    setFeedVersion(v => v + 1); // triggers feed re-fetch if feeds changed
  }, []);

  const allStories = useMemo(() => {
    const combined = [];
    const feat = [...FEATURED];
    const live = [...liveStories];
    if (feat.length > 0) combined.push(feat.shift());
    while (live.length > 0 || feat.length > 0) {
      for (let i = 0; i < 3 && live.length > 0; i++) combined.push(live.shift());
      if (feat.length > 0) combined.push(feat.shift());
    }
    return combined;
  }, [liveStories]);

  const filteredStories = useMemo(() => {
    if (!activeFilter || activeFilter === "All") return allStories;
    return allStories.filter(s => storyMatchesFilter(s, activeFilter));
  }, [allStories, activeFilter]);

  const goHome = useCallback(() => { setView({ type: "home" }); window.scrollTo(0, 0); }, []);
  const openStory = useCallback((id) => { setView({ type: "thread", storyId: id }); window.scrollTo(0, 0); }, []);
  const handleFilter = useCallback((f) => { setActiveFilter(f); setView({ type: "home" }); window.scrollTo(0, 0); }, []);
  const goFantasy = useCallback(() => { setView({ type: "fantasy" }); window.scrollTo(0, 0); }, []);
  const activeStory = view.type === "thread" ? allStories.find(s => s.id === view.storyId) : null;

  return (
    <div style={{ backgroundColor: C.bg, maxWidth: 900, margin: "0 auto", minHeight: "100vh", fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" }}>
      <Header onHome={goHome} lastRefresh={lastRefresh} activeFilter={activeFilter} onFilter={handleFilter} onEditFeeds={() => { setShowFeedEditor(e => !e); setShowEditor(false); }} feedEditorOpen={showFeedEditor} onFantasy={goFantasy} fantasyActive={view.type === "fantasy"} />
      <BirthdayBanner />
      {view.type === "fantasy" ? (
        <div>
          <FantasyDashboard profile={profile} onSaveProfile={handleSaveProfile} />
          <Footer />
        </div>
      ) : view.type === "home" ? (
        <div>
          <div style={{ margin: "10px 16px", padding: "10px 14px", backgroundColor: "#fff", border: "1px solid #e5e7eb", borderRadius: 6, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
            <div style={{ display: "flex", gap: 16, flexWrap: "wrap", fontSize: 11, color: C.meta }}>
              <span><span style={{ color: C.green }}>✓</span> Sourced claims</span>
              <span><span style={{ color: C.blue }}>■</span> LIVE = Fresh from RSS</span>
              <span><span style={{ color: C.gold }}>■</span> FEATURED = Curated</span>
              <span>{liveStories.length} live stories</span>
            </div>
            <button onClick={() => { setShowEditor(e => !e); setShowFeedEditor(false); }} style={{
              padding: "5px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap",
              backgroundColor: showEditor ? C.gold : "#f1f5f9", color: showEditor ? C.navy : C.meta,
              border: showEditor ? "none" : "1px solid #d1d5db", borderRadius: 4
            }}>{showEditor ? "Close Editor" : "Customize Profile"}</button>
          </div>
          {showEditor && <ProfileEditor profile={profile} onSave={handleSaveProfile} onClose={() => setShowEditor(false)} />}
          {showFeedEditor && <FeedEditor profile={profile} onSave={handleSaveProfile} onClose={() => setShowFeedEditor(false)} />}
          {activeFilter && activeFilter !== "All" && (
            <div style={{ margin: "0 16px 8px", padding: "8px 14px", backgroundColor: C.navy, borderRadius: 6, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 13, color: "#fff", fontWeight: 500 }}>
                Showing: <strong style={{ color: C.gold }}>{activeFilter}</strong> ({filteredStories.length} {filteredStories.length === 1 ? "story" : "stories"})
              </span>
              <span onClick={() => handleFilter("All")} style={{ fontSize: 11, color: "#94a3b8", cursor: "pointer", textDecoration: "underline" }}>Show all</span>
            </div>
          )}
          {loading ? <LoadingState /> : filteredStories.length > 0 ? filteredStories.map((s, i) => (
            <StoryCard key={s.id} story={s} rank={i + 1} onOpen={openStory} />
          )) : (
            <div style={{ padding: "40px 20px", textAlign: "center", color: C.meta }}>
              <div style={{ fontSize: 14 }}>No stories match "<strong>{activeFilter}</strong>" right now.</div>
              <div onClick={() => handleFilter("All")} style={{ marginTop: 8, fontSize: 13, color: C.blue, cursor: "pointer" }}>Show all stories</div>
            </div>
          )}
          <Footer />
        </div>
      ) : activeStory ? (
        <div>
          <ThreadView story={activeStory} onBack={goHome} />
          <Footer />
        </div>
      ) : (
        <div style={{ padding: 40, textAlign: "center", color: C.meta }}>Story not found. <span onClick={goHome} style={{ color: C.blue, cursor: "pointer" }}>Go back</span></div>
      )}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(window.__App));
  </script>
</body>
</html>
